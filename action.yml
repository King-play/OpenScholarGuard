name: OpenScholarGuard Audit
description: Scan scholarly documents, RAG inputs, and repositories for document-borne prompt-injection risks.
author: OpenScholarGuard contributors

inputs:
  targets:
    description: Files or directories to audit.
    required: false
    default: "."
  profile:
    description: Scan profile.
    required: false
    default: "ai-review"
  fail-on:
    description: Failure threshold.
    required: false
    default: "high"
  output:
    description: SARIF output path.
    required: false
    default: "openscholarguard.sarif"
  install-spec:
    description: Package install spec. Use "." when running from this repository.
    required: false
    default: "openscholarguard[pdf]"

runs:
  using: composite
  steps:
    - name: Install OpenScholarGuard
      shell: bash
      run: |
        python -m pip install -U pip
        python -m pip install "${{ inputs.install-spec }}"
    - name: Run OpenScholarGuard audit
      shell: bash
      env:
        OSG_TARGETS: ${{ inputs.targets }}
        OSG_PROFILE: ${{ inputs.profile }}
        OSG_FAIL_ON: ${{ inputs.fail-on }}
        OSG_OUTPUT: ${{ inputs.output }}
      run: |
        python -m openscholarguard audit "$OSG_TARGETS" \
          --profile "$OSG_PROFILE" \
          --fail-on "$OSG_FAIL_ON" \
          --format sarif \
          --output "$OSG_OUTPUT"
