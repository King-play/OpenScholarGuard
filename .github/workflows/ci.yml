name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install -U pip
          python -m pip install -e ".[dev]"
      - name: Lint
        run: python -m ruff check .
      - name: Type check
        run: python -m mypy src/openscholarguard
      - name: Test
        run: python -m pytest --cov=openscholarguard --cov-report=term-missing
      - name: Rule-pack verification
        run: python -m openscholarguard rules verify examples/rule-pack.json --require-tests
      - name: Doctor
        run: python -m openscholarguard doctor --demo
      - name: Build demo
        run: python -m openscholarguard demo --output-dir demo-output --overwrite

  package:
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install build backend
        run: |
          python -m pip install -U pip
          python -m pip install build
      - name: Build package
        run: python -m build
      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*
